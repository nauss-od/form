<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>تسجيل الدخول — نايف</title>
<link href="assets/styles.css" rel="stylesheet" />
</head>
<body style="background:linear-gradient(180deg,#f7faf9,#f3f7f6)">
  <header class="header">
    <div class="brand"><img src="assets/nauss-logo.png" alt="جامعة نايف" /></div>
  </header>

  <main class="container" style="display:flex;gap:28px;align-items:center;min-height:72vh">
    <div style="flex:1">
      <div class="login-card">
        <div class="login-header">
          <img src="assets/nauss-logo.png" alt="logo" style="height:36px"/>
          <div class="title">تسجيل الدخول</div>
        </div>
        <p class="small">الوصول محمي ومخصص للحسابات المعتمدة</p>
        <div class="form-row"><label>البريد الإلكتروني</label><input class="input" type="text" /></div>
        <div class="form-row"><label>كلمة المرور</label><input class="input" type="password" /></div>
        <button class="btn-primary" style="margin-top:12px">تسجيل الدخول</button>
      </div>
    </div>

    <div style="flex:1;padding:18px">
      <h2 class="h1" style="font-size:36px;color:var(--primary)">منصة تشغيل مؤسسية للدورات الخارجية</h2>
      <p class="lead">تجربة دخول هادئة وفاخرة، بهوية جامعة نايف، وواجهة مصممة لإدارة البيانات التشغيلية والمخرجات الرسمية بأسلوب رصين وواضح.</p>
    </div>
  </main>
<script src="assets/scripts.js"></script>
</body>
</html>
