<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>تسجيل الدخول — نايف</title>
  <link href="assets/styles.css" rel="stylesheet" />
</head>
<body style="background:linear-gradient(90deg,#f6f7f7,#f8fbfb)">
  <header class="header"><div class="brand"><img src="assets/nauss-logo.png" alt="نايف" style="height:44px"/></div></header>
  <main class="container" style="display:flex;gap:28px;align-items:center;min-height:70vh">
    <div style="flex:1">
      <div class="login-card">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <img src="assets/nauss-logo.png" alt="logo" style="height:36px"/>
          <div style="font-weight:700;font-size:18px">تسجيل الدخول</div>
        </div>
        <p style="color:var(--muted);margin:6px 0 14px">الوصول محمي ومخصص للحسابات المعتمدة.</p>
        <div class="form-group"><label>البريد الإلكتروني</label><input type="text" /></div>
        <div class="form-group"><label>كلمة المرور</label><input type="password" /></div>
        <button class="login-btn" style="margin-top:8px">تسجيل الدخول</button>
      </div>
    </div>

    <div style="flex:1;padding:18px">
      <h1 style="font-size:36px;margin:0 0 10px;color:var(--primary)">منصة تشغيل مؤسسية للدورات الخارجية</h1>
      <p style="color:var(--muted);max-width:520px">تجربة دخول هادئة وفاخرة، بهوية جامعة نايف، وواجهة مصممة لإدارة البيانات التشغيلية والمخرجات الرسمية بأسلوب رصين وواضح.</p>
    </div>
  </main>
</body>
</html>
